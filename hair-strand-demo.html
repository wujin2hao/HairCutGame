<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>发丝渲染演示 · 剪刘海</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: #f6f1e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    color: #2a2a2a;
  }

  h1 {
    font-family: 'Noto Serif SC', Georgia, serif;
    font-weight: 700;
    font-size: 28px;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }

  .subtitle {
    color: #888;
    font-size: 14px;
    margin-bottom: 24px;
  }

  .canvas-wrap {
    background: white;
    border: 2px solid #2a2a2a;
    border-radius: 12px;
    box-shadow: 6px 6px 0 #2a2a2a;
    overflow: hidden;
  }

  canvas {
    display: block;
    cursor: crosshair;
  }

  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 20px;
    background: white;
    border: 2px solid #2a2a2a;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 3px 3px 0 #2a2a2a;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  button:hover { background: #fff8e8; }
  button:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #2a2a2a;
  }

  .info {
    margin-top: 16px;
    font-size: 13px;
    color: #555;
    text-align: center;
    line-height: 1.7;
  }
  .info strong { color: #c44; }

  .legend {
    margin-top: 24px;
    max-width: 600px;
    background: white;
    border: 2px dashed #bbb;
    border-radius: 8px;
    padding: 16px 20px;
    font-size: 13px;
    line-height: 1.7;
    color: #555;
  }
  .legend code {
    background: #f0e8d8;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 12px;
  }
</style>
</head>
<body>

<h1>2D 发丝渲染 · 切割演示</h1>
<p class="subtitle">点击画布任意位置 → 剪刀在该高度切过所有发丝</p>

<div class="canvas-wrap">
  <canvas id="game" width="600" height="500"></canvas>
</div>

<div class="controls">
  <button id="reset">🔄 重置头发</button>
  <button id="toggle">🔀 切换：发丝模式 / 实心模式</button>
  <button id="showStrokes">👁 显示发丝边界</button>
</div>

<div class="info">
  当前模式：<strong id="modeLabel">发丝模式（每根独立）</strong><br>
  上次切割高度：<span id="cutY">—</span> px
</div>

<div class="legend">
  <strong>实现要点：</strong><br>
  · 每根发丝是一个对象 <code>{ x, topY, bottomY, width, curveOffset, hueShift }</code><br>
  · 用 <code>quadraticCurveTo</code> 画带轻微弯曲的 path，<code>lineCap: 'round'</code> 让端点圆润<br>
  · 每根发丝有独立的渐变（顶部偏紫 → 底部接近黑），制造立体感<br>
  · 切割就是更新对应发丝的 <code>bottomY</code>，视觉与逻辑统一
</div>

<script>
// ====== 配置 ======
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// 头部和刘海的几何参数
const HEAD = {
  centerX: 300,
  centerY: 250,
  width: 180,
  height: 220,
};

// 刘海覆盖区域
const HAIR = {
  leftX: 215,
  rightX: 385,
  topY: 145,
  bottomY: 270,        // 刘海原始底部
  strandCount: 42,     // 发丝总数
};

// ====== 发丝数据 ======
let strands = [];
let mode = 'strand';   // 'strand' 或 'solid'
let showStrokes = false;
let lastCutY = null;

function initStrands() {
  strands = [];
  for (let i = 0; i < HAIR.strandCount; i++) {
    const t = i / (HAIR.strandCount - 1);
    // 基础 X 位置 + 微小随机偏移，避免完全均匀
    const baseX = HAIR.leftX + t * (HAIR.rightX - HAIR.leftX);

    // 边缘的发丝稍微短一些，让刘海整体呈圆弧形
    const edgeFactor = 1 - Math.pow(2 * t - 1, 2) * 0.15;

    strands.push({
      x: baseX + (Math.random() - 0.5) * 1.5,
      topY: HAIR.topY - 8 + Math.random() * 4,
      bottomY: HAIR.bottomY * edgeFactor + (Math.random() - 0.5) * 3,
      originalBottom: HAIR.bottomY * edgeFactor + (Math.random() - 0.5) * 3,
      width: 6 + Math.random() * 2.5,
      curveOffset: (Math.random() - 0.5) * 3,  // 轻微弯曲幅度
      hueShift: (Math.random() - 0.5) * 12,    // 颜色微变化
      lightShift: (Math.random() - 0.5) * 6,   // 亮度微变化
      cut: false,
    });
  }
}

// ====== 绘制函数 ======

// 画头型（简化版，用于上下文）
function drawHead() {
  // 脖子和身体
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(240, 360);
  ctx.lineTo(240, 410);
  ctx.lineTo(150, 480);
  ctx.lineTo(450, 480);
  ctx.lineTo(360, 410);
  ctx.lineTo(360, 360);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // 脸（圆角矩形/椭圆）
  ctx.fillStyle = '#fff7ec';
  ctx.beginPath();
  ctx.ellipse(HEAD.centerX, HEAD.centerY, HEAD.width / 2, HEAD.height / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // 耳朵
  ctx.beginPath();
  ctx.ellipse(HEAD.centerX - HEAD.width / 2, HEAD.centerY + 10, 14, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(HEAD.centerX + HEAD.width / 2, HEAD.centerY + 10, 14, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // 腮红
  ctx.fillStyle = '#f7c8c8';
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.ellipse(HEAD.centerX - 45, HEAD.centerY + 30, 18, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(HEAD.centerX + 45, HEAD.centerY + 30, 18, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // 眼睛（隐藏在刘海下，仍画出来以便剪短后可见）
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(HEAD.centerX - 25, HEAD.centerY + 5, 8, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(HEAD.centerX + 25, HEAD.centerY + 5, 8, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // 嘴
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(HEAD.centerX, HEAD.centerY + 50, 8, 0, Math.PI);
  ctx.stroke();

  // 鼻子（小点）
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(HEAD.centerX, HEAD.centerY + 28, 1.8, 0, Math.PI * 2);
  ctx.fill();
}

// 画单根发丝
function drawStrand(s) {
  if (s.bottomY <= s.topY) return;  // 完全剪掉了

  // 每根发丝独立的纵向渐变
  const grad = ctx.createLinearGradient(s.x, s.topY, s.x, s.bottomY);
  const baseHue = 265 + s.hueShift;
  grad.addColorStop(0, `hsl(${baseHue}, 30%, ${28 + s.lightShift}%)`);
  grad.addColorStop(0.6, `hsl(${baseHue}, 35%, ${15 + s.lightShift}%)`);
  grad.addColorStop(1, `hsl(${baseHue}, 40%, ${6 + s.lightShift}%)`);

  ctx.beginPath();
  ctx.moveTo(s.x, s.topY);
  // 二次贝塞尔，制造轻微弯曲
  ctx.quadraticCurveTo(
    s.x + s.curveOffset,
    (s.topY + s.bottomY) / 2,
    s.x + s.curveOffset * 0.3,
    s.bottomY
  );
  ctx.strokeStyle = grad;
  ctx.lineWidth = s.width;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 调试：显示发丝边界
  if (showStrokes) {
    ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(s.x, s.topY);
    ctx.lineTo(s.x, s.bottomY);
    ctx.stroke();
  }
}

// 画实心模式（对比用）
function drawSolidHair() {
  const grad = ctx.createLinearGradient(0, HAIR.topY, 0, HAIR.bottomY);
  grad.addColorStop(0, '#3a2a48');
  grad.addColorStop(1, '#0a0612');

  ctx.fillStyle = grad;
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.moveTo(HAIR.leftX, HAIR.bottomY);
  ctx.lineTo(HAIR.leftX, HAIR.topY + 20);
  ctx.quadraticCurveTo(HEAD.centerX, HAIR.topY - 30, HAIR.rightX, HAIR.topY + 20);
  ctx.lineTo(HAIR.rightX, HAIR.bottomY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

// 画上次切割的辅助线
function drawCutLine() {
  if (lastCutY === null) return;
  ctx.strokeStyle = 'rgba(220, 70, 70, 0.6)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(HAIR.leftX - 30, lastCutY);
  ctx.lineTo(HAIR.rightX + 30, lastCutY);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ====== 主渲染循环 ======
function render() {
  ctx.clearRect(0, 0, W, H);
  drawHead();

  if (mode === 'strand') {
    strands.forEach(drawStrand);
  } else {
    drawSolidHair();
  }

  drawCutLine();
}

// ====== 切割逻辑 ======
function cutAt(y) {
  // 只在刘海高度范围内才有效
  if (y < HAIR.topY || y > HAIR.bottomY + 30) return;

  if (mode === 'strand') {
    strands.forEach(s => {
      if (y > s.topY + 5 && y < s.bottomY) {
        s.bottomY = y;
        s.cut = true;
      }
    });
  }
  lastCutY = y;
  document.getElementById('cutY').textContent = Math.round(y);
  render();
}

// ====== 事件 ======
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  cutAt(y);
});

document.getElementById('reset').addEventListener('click', () => {
  initStrands();
  lastCutY = null;
  document.getElementById('cutY').textContent = '—';
  render();
});

document.getElementById('toggle').addEventListener('click', () => {
  mode = mode === 'strand' ? 'solid' : 'strand';
  document.getElementById('modeLabel').textContent =
    mode === 'strand' ? '发丝模式（每根独立）' : '实心模式（单一形状）';
  render();
});

document.getElementById('showStrokes').addEventListener('click', () => {
  showStrokes = !showStrokes;
  render();
});

// ====== 启动 ======
initStrands();
render();
</script>

</body>
</html>
