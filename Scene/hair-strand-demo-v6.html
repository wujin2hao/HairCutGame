<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>剪刘海 · Step 2 · 头发切割</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang SC', sans-serif;
    background: #f6f1e8; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; padding: 28px 16px;
  }
  h1  { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: #1a1a1a; }
  .sub { color: #888; font-size: 13px; margin-bottom: 18px; }
  .wrap {
    background: #fff; border: 2px solid #1a1a1a; border-radius: 12px;
    box-shadow: 5px 5px 0 #1a1a1a; overflow: hidden;
  }
  canvas { display: block; cursor: none; }
  .ctrl {
    margin-top: 14px; display: flex; gap: 10px;
    flex-wrap: wrap; justify-content: center;
  }
  button {
    font-family: inherit; font-size: 13px; padding: 9px 18px;
    background: white; border: 2px solid #1a1a1a; border-radius: 8px;
    cursor: pointer; box-shadow: 3px 3px 0 #1a1a1a;
    transition: transform .08s, box-shadow .08s;
  }
  button:hover  { background: #fff8e8; }
  button:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #1a1a1a; }
  .key-hint {
    margin-top: 10px; display: flex; gap: 24px;
    justify-content: center; font-size: 13px; color: #555;
  }
  .key-hint span { display: flex; align-items: center; gap: 6px; }
  kbd {
    padding: 3px 8px; border: 2px solid #1a1a1a; border-radius: 5px;
    box-shadow: 2px 2px 0 #1a1a1a; font-family: inherit; font-size: 12px;
    background: #fff; font-weight: bold;
  }
  .info { margin-top: 10px; font-size: 12px; color: #888; text-align: center; line-height: 1.9; }
</style>
</head>
<body>

<h1>✂ 剪刘海 · Step 2 头发切割</h1>
<p class="sub">闭合瞬间切刀刃 X 内、延伸到刀刃 Y 以下的发丝 · 弧段切走 De Casteljau 子分</p>

<div class="wrap"><canvas id="c" width="600" height="520"></canvas></div>

<div class="ctrl">
  <button id="btnReset">🔄 重置</button>
  <button id="btnDbg">🔵 调试</button>
</div>
<div class="key-hint">
  <span>⬆ 抬升 <kbd>SPACE</kbd></span>
  <span>✂ 闭合切割 <kbd>J</kbd> / 鼠标点击（debug）</span>
</div>
<div class="info">
  按住 <b>空格</b> 抵抗重力 · 按 <b>J</b> 在当前刀刃位置切一次<br>
  调试模式开启时显示采样点 + 刀刃区间
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  画布
// ══════════════════════════════════════════════════════════════════
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
const W   = cv.width;   // 600
const H   = cv.height;  // 520

// ══════════════════════════════════════════════════════════════════
//  头发参数（与 v5 完全一致）
// ══════════════════════════════════════════════════════════════════
const R     = 116;
const EXTRA = 62;
const CX    = 300;
const CY0   = 155;
const CYB   = CY0 + R;       // 271 — 圆弧终点（最宽处）
const CYBT  = CYB + EXTRA;   // 333 — 发梢终点
const N     = 58;             // 发丝根数
const ARC_SAMPLES = 20;       // 弧段切割的采样段数（21 个采样点）

// ══════════════════════════════════════════════════════════════════
//  物理配置（与 v5 一致）
// ══════════════════════════════════════════════════════════════════
const CONFIG = {
  gravity:           1100,
  thrustForce:       2400,
  linearDrag:        2.0,
  autoAdvanceSpeed:  75,

  startX:  560,
  startY:  230,
  minY:     90,
  maxY:    470,
};

// ══════════════════════════════════════════════════════════════════
//  剪刀图片
// ══════════════════════════════════════════════════════════════════
const scissorImg    = new Image();
scissorImg.src      = '../Assets/jiandao.png';

const SC_ORIG_W  = 130;
const SC_ORIG_H  = 173;
const SC_LEN     = 110;
const SC_THICK   = Math.round(SC_ORIG_W / SC_ORIG_H * SC_LEN);

const MAX_OPEN_PX = 14;

// ══════════════════════════════════════════════════════════════════
//  状态
// ══════════════════════════════════════════════════════════════════
let strands   = [];
let debug     = false;
let lastTime  = null;

const keys = { space: false };

const sc = {
  x:       CONFIG.startX,
  y:       CONFIG.startY,
  vy:      0,
  open:    false,
  openAmt: 0,
};

// ══════════════════════════════════════════════════════════════════
//  几何工具
// ══════════════════════════════════════════════════════════════════
function lerp(a, b, t) {
  return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
}

// 三次 Bezier 在参数 t 处的点
function bezierAt(p0, p1, p2, p3, t) {
  const u = 1 - t;
  const uu = u * u, uuu = uu * u;
  const tt = t * t, ttt = tt * t;
  return {
    x: uuu * p0.x + 3 * uu * t * p1.x + 3 * u * tt * p2.x + ttt * p3.x,
    y: uuu * p0.y + 3 * uu * t * p1.y + 3 * u * tt * p2.y + ttt * p3.y,
  };
}

// De Casteljau 在 t 处子分，返回 t 之前的"左半段"控制点（含端点）
//   输入：原始三次 Bezier 的 4 个点 p0,p1,p2,p3
//   输出：{ q0, r0, s }  即新的 cp1, cp2, end —— 起点 p0 不变
function deCasteljauLeft(p0, p1, p2, p3, t) {
  const q0 = lerp(p0, p1, t);
  const q1 = lerp(p1, p2, t);
  const q2 = lerp(p2, p3, t);
  const r0 = lerp(q0, q1, t);
  const r1 = lerp(q1, q2, t);
  const s  = lerp(r0, r1, t);
  return { q0, r0, s };
}

// ══════════════════════════════════════════════════════════════════
//  输入
// ══════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); keys.space = true; }
  if (e.code === 'KeyJ' && !e.repeat) {
    sc.open = !sc.open;
    performCut();          // ← 闭合键按下瞬间触发一次切割
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') keys.space = false;
});
cv.addEventListener('mousedown', e => {
  e.preventDefault();
  sc.open = !sc.open;
  performCut();            // ← 鼠标点击保留作 debug 触发
});

// ══════════════════════════════════════════════════════════════════
//  物理更新
// ══════════════════════════════════════════════════════════════════
function updatePhysics(dt) {
  sc.vy += CONFIG.gravity * dt;
  if (keys.space) sc.vy -= CONFIG.thrustForce * dt;
  sc.vy *= Math.exp(-CONFIG.linearDrag * dt);
  sc.x  -= CONFIG.autoAdvanceSpeed * dt;
  sc.y  += sc.vy * dt;

  if (sc.y < CONFIG.minY) { sc.y = CONFIG.minY; sc.vy = Math.max(0, sc.vy); }
  if (sc.y > CONFIG.maxY) { sc.y = CONFIG.maxY; sc.vy = Math.min(0, sc.vy); }

  sc.openAmt += ((sc.open ? 1 : 0) - sc.openAmt) * Math.min(1, dt * 20);

  if (sc.x < -SC_LEN) resetAll();
}

function resetScissor() {
  sc.x       = CONFIG.startX;
  sc.y       = CONFIG.startY;
  sc.vy      = 0;
  sc.open    = false;
  sc.openAmt = 0;
}

function resetAll() {
  initStrands();
  resetScissor();
  lastTime = null;
}

// ══════════════════════════════════════════════════════════════════
//  发丝生成
// ══════════════════════════════════════════════════════════════════
function makeStrand(pos, jitter = true) {
  const theta = pos === 0 ? 0
    : Math.sign(pos) * Math.asin(Math.min(0.9999, Math.abs(pos) * 2));
  const cpLen = (4/3) * R * Math.tan(Math.abs(theta) / 4);
  const jx = jitter ? (Math.random() - 0.5) * 2.5 : 0;
  const jy = jitter ? (Math.random() - 0.5) * 2   : 0;
  const p0      = { x: CX + (jitter ? (Math.random()-0.5)*3 : 0), y: CY0 };
  const arcEnd  = { x: CX + Math.sin(theta)*R + jx, y: CYB + jy };
  const p1      = { x: p0.x + Math.sin(theta)*cpLen, y: p0.y + Math.cos(theta)*cpLen };
  const p2      = { x: arcEnd.x, y: arcEnd.y - cpLen };
  const fullEnd = { x: arcEnd.x, y: CYBT + jy };

  // 预采样弧段：21 个 {x, y, t}，供切割时数值查表
  const samples = [];
  for (let i = 0; i <= ARC_SAMPLES; i++) {
    const t = i / ARC_SAMPLES;
    const pt = bezierAt(p0, p1, p2, arcEnd, t);
    samples.push({ x: pt.x, y: pt.y, t });
  }

  return { p0, p1, p2, arcEnd, fullEnd, theta, cpLen, samples };
}

function initStrands() {
  strands = [];

  // 主体 N 根（带 jitter）
  for (let i = 0; i < N; i++) {
    const s = makeStrand((i / (N-1)) - 0.5, true);
    strands.push(_buildStrandState(s, {
      w:    5   + Math.random() * 2.5,
      hue:  265 + (Math.random() - 0.5) * 16,
      ltop: 28  + (Math.random() - 0.5) * 5,
      lbot: 6   + (Math.random() - 0.5) * 3,
    }));
  }

  // 边缘填充发丝：在 theta = 78°,82°,86°,90° 各补一根（每侧），无 jitter
  // 让边缘曲率从主体最外侧（pos=±0.4825，theta≈75°）平滑过渡到轮廓（90°）
  // 反推 pos = sin(theta)/2
  const EDGE_THETAS_DEG = [78, 82, 86, 90];
  EDGE_THETAS_DEG.forEach(deg => {
    const theta = deg * Math.PI / 180;
    [-1, +1].forEach(sign => {
      const pos = sign * Math.sin(theta) / 2;
      const s = makeStrand(pos, false);
      strands.push(_buildStrandState(s, {
        w:    6.5,
        hue:  265,
        ltop: 28,
        lbot: 6,
      }));
    });
  });
}

function _buildStrandState(s, vis) {
  return {
    ...s,
    ...vis,
    // ─ 切割状态 ─
    endY:     s.fullEnd.y,
    cutInArc: false,
    cutP1:    null,
    cutP2:    null,
    cutEnd:   null,
  };
}

// ══════════════════════════════════════════════════════════════════
//  切割：基于刀刃 X 区间和 Y 高度
// ══════════════════════════════════════════════════════════════════
function performCut() {
  // 刀刃区间：剪刀左半段（刀尖到中心螺丝），右半是握把不切
  const bladeX0 = sc.x - SC_LEN / 2;
  const bladeX1 = sc.x;
  const bladeY  = sc.y;

  for (const s of strands) {
    const tipX = s.arcEnd.x;
    if (tipX < bladeX0 || tipX > bladeX1) continue;

    // 当前发梢 Y：弧段已切→cutEnd.y；未切或直线段切→endY
    const currentEndY = s.cutInArc ? s.cutEnd.y : s.endY;

    // 刀刃比当前发梢还高（Y 更小）= 刀离它远，无需切
    if (bladeY >= currentEndY) continue;

    if (bladeY >= s.arcEnd.y) {
      // ── 直线段切：直接缩短 ──
      // （若已 cutInArc，那 cutEnd.y < arcEnd.y，进不了这分支）
      s.endY = bladeY;
    } else {
      // ── 弧段切：20 采样找 t，再 De Casteljau 子分 ──
      let tCut = null;
      for (let i = 0; i < s.samples.length - 1; i++) {
        const a = s.samples[i], b = s.samples[i + 1];
        if (a.y <= bladeY && b.y >= bladeY && a.y !== b.y) {
          const u = (bladeY - a.y) / (b.y - a.y);
          tCut = a.t + (b.t - a.t) * u;
          break;
        }
      }
      if (tCut === null) continue;

      // 若已经被切过弧段，新切只在更高位置（更小 t）才生效
      if (s.cutInArc) {
        // 反推当前 cut 的 t 不方便；用 Y 比较代替：新 bladeY 必须更小
        if (bladeY >= s.cutEnd.y) continue;
      }

      const { q0, r0, s: cutPt } = deCasteljauLeft(s.p0, s.p1, s.p2, s.arcEnd, tCut);
      s.cutInArc = true;
      s.cutP1    = q0;
      s.cutP2    = r0;
      s.cutEnd   = cutPt;
    }
  }
}

// ══════════════════════════════════════════════════════════════════
//  绘制：头部（与 v5 完全一致）
// ══════════════════════════════════════════════════════════════════
function drawHead() {
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#1a1a1a';

  ctx.fillStyle = '#fffbf4';
  ctx.beginPath();
  ctx.moveTo(225,392); ctx.lineTo(225,432); ctx.lineTo(145,515);
  ctx.lineTo(455,515); ctx.lineTo(375,432); ctx.lineTo(375,392);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#fff7ec';
  ctx.beginPath();
  ctx.ellipse(300, 328, 102, 108, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  [[-103, 10], [103, 10]].forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.ellipse(300+dx, 328+dy, 15, 21, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  });

  ctx.globalAlpha = 0.6;
  ctx.fillStyle = '#f7c0c0';
  ctx.beginPath(); ctx.ellipse(252, 352, 19, 12, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(348, 352, 19, 12, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#1a1a1a';
  [[273, 313], [327, 313]].forEach(([x, y]) => {
    ctx.beginPath(); ctx.ellipse(x, y, 8, 11, 0, 0, Math.PI*2); ctx.fill();
  });

  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(300, 362, 9, 0, Math.PI); ctx.stroke();

  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(300, 340, 2, 0, Math.PI*2); ctx.fill();
}

// ══════════════════════════════════════════════════════════════════
//  绘制：头发底色（与 v5 完全一致）
// ══════════════════════════════════════════════════════════════════
function drawBase() {
  const L  = makeStrand(-0.5, false);
  const Rr = makeStrand(+0.5, false);
  const grad = ctx.createLinearGradient(CX, CY0, CX, CYBT);
  grad.addColorStop(0,    '#3e2153');
  grad.addColorStop(0.35, '#200f30');
  grad.addColorStop(1,    '#09060f');
  ctx.beginPath();
  ctx.moveTo(L.p0.x, L.p0.y);
  ctx.bezierCurveTo(L.p1.x, L.p1.y, L.p2.x, L.p2.y, L.arcEnd.x, L.arcEnd.y);
  ctx.lineTo(L.fullEnd.x, L.fullEnd.y);
  ctx.lineTo(Rr.fullEnd.x, Rr.fullEnd.y);
  ctx.lineTo(Rr.arcEnd.x, Rr.arcEnd.y);
  ctx.bezierCurveTo(Rr.p2.x, Rr.p2.y, Rr.p1.x, Rr.p1.y, Rr.p0.x, Rr.p0.y);
  ctx.closePath();
  ctx.fillStyle = grad;   ctx.fill();
  ctx.strokeStyle = '#15101e'; ctx.lineWidth = 3; ctx.stroke();
}

// ══════════════════════════════════════════════════════════════════
//  绘制：单根发丝（v6 — 支持切割状态）
// ══════════════════════════════════════════════════════════════════
function drawStrand(s) {
  // 当前实际终点（用于渐变）
  const endX = s.cutInArc ? s.cutEnd.x : s.arcEnd.x;
  const endY = s.cutInArc ? s.cutEnd.y : s.endY;

  const grad = ctx.createLinearGradient(s.p0.x, s.p0.y, endX, endY);
  grad.addColorStop(0,    `hsl(${s.hue},26%,${s.ltop}%)`);
  grad.addColorStop(0.45, `hsl(${s.hue},34%,${(s.ltop+s.lbot)/2}%)`);
  grad.addColorStop(1,    `hsl(${s.hue},44%,${s.lbot}%)`);

  ctx.beginPath();
  ctx.moveTo(s.p0.x, s.p0.y);
  if (s.cutInArc) {
    // 弧段内被切：截短的 bezier，无直线段
    ctx.bezierCurveTo(s.cutP1.x, s.cutP1.y, s.cutP2.x, s.cutP2.y, s.cutEnd.x, s.cutEnd.y);
  } else {
    // 未切 或 直线段切：完整 bezier + 缩短的直线段
    ctx.bezierCurveTo(s.p1.x, s.p1.y, s.p2.x, s.p2.y, s.arcEnd.x, s.arcEnd.y);
    ctx.lineTo(s.arcEnd.x, s.endY);
  }
  ctx.strokeStyle = grad;
  ctx.lineWidth   = s.w;
  ctx.lineCap     = 'round';
  ctx.stroke();
}

function drawDebugStrand(s) {
  ctx.save();
  ctx.strokeStyle = 'rgba(50,120,255,0.5)';
  ctx.lineWidth = 1;

  // 弧段采样点
  ctx.fillStyle = 'rgba(50,120,255,0.6)';
  for (const p of s.samples) {
    ctx.beginPath(); ctx.arc(p.x, p.y, 1.6, 0, Math.PI*2); ctx.fill();
  }

  // 切点高亮
  if (s.cutInArc) {
    ctx.beginPath(); ctx.arc(s.cutEnd.x, s.cutEnd.y, 4, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(220,50,50,0.85)'; ctx.fill();
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════
//  绘制：剪刀（与 v5 完全一致）
// ══════════════════════════════════════════════════════════════════
function drawScissor() {
  const DW = SC_THICK;
  const DH = SC_LEN;

  const openPx = sc.openAmt * MAX_OPEN_PX;

  ctx.save();
  ctx.translate(sc.x, sc.y);
  ctx.rotate(Math.PI / 2);

  const imgReady = scissorImg.complete && scissorImg.naturalWidth > 0;

  if (!imgReady) {
    _drawFallback(DW, DH);
  } else if (openPx < 0.5) {
    ctx.drawImage(scissorImg, -DW/2, -DH/2, DW, DH);
  } else {
    ctx.save();
    ctx.beginPath();
    ctx.rect(-DW/2 - 2, -DH/2 - 4, DW/2 + 4, DH + 8);
    ctx.clip();
    ctx.drawImage(scissorImg, -DW/2 - openPx, -DH/2, DW, DH);
    ctx.restore();

    ctx.save();
    ctx.beginPath();
    ctx.rect(-2, -DH/2 - 4, DW/2 + 4, DH + 8);
    ctx.clip();
    ctx.drawImage(scissorImg, -DW/2 + openPx, -DH/2, DW, DH);
    ctx.restore();
  }

  ctx.restore();

  if (debug) {
    // 中心点
    ctx.save();
    ctx.fillStyle = 'rgba(255, 60, 60, 0.9)';
    ctx.beginPath(); ctx.arc(sc.x, sc.y, 4, 0, Math.PI*2); ctx.fill();

    // 速度向量
    ctx.strokeStyle = 'rgba(255, 60, 60, 0.7)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sc.x, sc.y);
    ctx.lineTo(sc.x, sc.y + sc.vy * 0.025);
    ctx.stroke();

    // 刀刃区间（绿色横线 + 区间端点）
    ctx.strokeStyle = 'rgba(22,163,74,0.85)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(sc.x - SC_LEN/2, sc.y);
    ctx.lineTo(sc.x,            sc.y);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
  }
}

function _drawFallback(DW, DH) {
  const ang  = sc.openAmt * 0.30;
  const bladeLen = DH * 0.72;
  const handleR  = DW * 0.32;

  ctx.save();
  ctx.rotate(-ang);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-bladeLen, -DW * 0.06);
  ctx.lineTo(-bladeLen,  DW * 0.12);
  ctx.lineTo(0, DW * 0.06);
  ctx.closePath();
  ctx.fillStyle = '#c8c8c8';
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(handleR, -handleR * 1.1, handleR, handleR * 0.75, -0.35, 0, Math.PI*2);
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.rotate(ang);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-bladeLen,  DW * 0.06);
  ctx.lineTo(-bladeLen, -DW * 0.12);
  ctx.lineTo(0, -DW * 0.06);
  ctx.closePath();
  ctx.fillStyle = '#d4d4d4';
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(handleR, handleR * 1.1, handleR, handleR * 0.75, 0.35, 0, Math.PI*2);
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.restore();

  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI*2);
  ctx.fillStyle = '#aaa';  ctx.fill();
  ctx.strokeStyle = '#666'; ctx.lineWidth = 1; ctx.stroke();
}

// ══════════════════════════════════════════════════════════════════
//  绘制：HUD
// ══════════════════════════════════════════════════════════════════
function drawHUD() {
  ctx.save();

  const bx = 12, by = H - 62, bw = 168, bh = 52;

  ctx.fillStyle = 'rgba(255,255,255,0.90)';
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 8);
  ctx.fill();
  ctx.stroke();

  ctx.font = '13px -apple-system, PingFang SC, sans-serif';

  const spActive = keys.space;
  ctx.fillStyle = spActive ? '#16a34a' : '#aaa';
  ctx.textAlign = 'left';
  ctx.fillText('↑ SPACE', bx + 10, by + 21);
  if (spActive) {
    ctx.fillStyle = 'rgba(22,163,74,0.25)';
    ctx.fillRect(bx + 86, by + 9, 72, 10);
    ctx.fillStyle = '#16a34a';
    ctx.fillRect(bx + 86, by + 9, 72, 10);
  }

  ctx.fillStyle = sc.open ? '#d97706' : '#aaa';
  ctx.fillText(`✂ J   ${sc.open ? '张开' : '合拢'}`, bx + 10, by + 43);

  if (debug) {
    ctx.textAlign = 'right';
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    const cutCount = strands.filter(s => s.cutInArc || s.endY < s.fullEnd.y).length;
    const lines = [
      `vy = ${sc.vy >= 0 ? '+' : ''}${sc.vy.toFixed(0).padStart(5)} px/s`,
      ` x = ${sc.x.toFixed(0).padStart(6)} px`,
      ` y = ${sc.y.toFixed(0).padStart(6)} px`,
      `open = ${(sc.openAmt * 100).toFixed(0)}%`,
      `cut  = ${cutCount}/${N}`,
    ];
    lines.forEach((l, i) => ctx.fillText(l, W - 10, 18 + i * 18));
  }

  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════
//  主渲染
// ══════════════════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, W, H);

  drawHead();

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, CYBT + 4);
  ctx.clip();
  // v6 路线 A：去掉 drawBase()，让切短的发丝立即可见。drawBase 函数保留备用。
  [...strands]
    .sort((a, b) => Math.abs(b.theta) - Math.abs(a.theta))
    .forEach(s => { drawStrand(s); if (debug) drawDebugStrand(s); });
  ctx.restore();

  drawScissor();
  drawHUD();
}

// ══════════════════════════════════════════════════════════════════
//  游戏循环
// ══════════════════════════════════════════════════════════════════
function loop(ts) {
  if (lastTime === null) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  updatePhysics(dt);
  render();
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════════════════════
//  控件绑定
// ══════════════════════════════════════════════════════════════════
document.getElementById('btnReset').addEventListener('click', resetAll);
document.getElementById('btnDbg').addEventListener('click', () => { debug = !debug; });

// ══════════════════════════════════════════════════════════════════
//  启动
// ══════════════════════════════════════════════════════════════════
initStrands();
requestAnimationFrame(loop);
</script>
</body>
</html>
